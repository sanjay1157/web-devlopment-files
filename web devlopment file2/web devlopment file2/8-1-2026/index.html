<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="./style.css">

    <style>
        h2{
            background-color: aqua;
        }

        #yes{
            background-color: pink;
        }

        .no{

            background-color: brown;
        }

        div p {
  color: blue;
}

        div > p {
  color: red;
}

div ~ p {
  color: purple;
}

    </style>
</head>
<body>
    <h1 style="background-color: blueviolet;">hello team</h1>

    <h2>welcome to my world</h2>

    <h3>this is my home</h3>

    <!-- combinator selector  -->
    <div>

        <p>first paragraph</p>
        <p>second paragraph</p>

        <section>

            <p>you are a genius</p>
        </section>
    </div>

    <p id="yes">This is mini world</p>

    <p class="no">this is big world</p>
</body>
</html>
