<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animated Hover Card</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    width: 300px;
    height: 400px;
    overflow: hidden;
    border-radius: 15px;
    position: relative;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  }

  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
  }

  /* Overlay */
  .card-content {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    padding: 20px;
    color: #fff;
    background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
    
    transform: translateY(100%);
    opacity: 0;
    transition: all 0.5s ease;
  }

  .card:hover img {
    transform: scale(1.1);
  }

  .card:hover .card-content {
    transform: translateY(0);
    opacity: 1;
  }

  .card h3 {
    margin: 0 0 10px;
  }

  .card p {
    font-size: 14px;
  }
</style>

</head>
<body>

<div class="card">
  <img src="https://picsum.photos/300/400" alt="Image">
  <div class="card-content">
    <h3>Beautiful View</h3>
    <p>This is a smooth hover animation card with zoom and text reveal.</p>
  </div>
</div>

</body>
</html>
